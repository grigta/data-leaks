# Ruff configuration for Python linting
# https://docs.astral.sh/ruff/

line-length = 120
target-version = "py311"

[lint]
# Enable only critical rules for now
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
]

# Ignore rules that would require significant refactoring
ignore = [
    "E501",  # line too long (handled by line-length)
    "E402",  # module level import not at top of file
    "E712",  # comparison to True/False (common in SQLAlchemy)
    "E722",  # bare except
    "F401",  # imported but unused (lots of false positives)
    "F541",  # f-string without placeholders
    "F601",  # dictionary key literal repeated
    "F811",  # redefinition of unused variable
    "F841",  # local variable assigned but never used
]

[lint.per-file-ignores]
# Alembic migrations can have any issues
"alembic/*" = ["E", "F", "W"]
# Tests can have more relaxed rules
"tests/*" = ["E", "F", "W"]
