<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Lookup - Background Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Person Lookup</h1>
        <p>Search for background information using name, address, or phone number</p>
    </header>

    <main>
        <section class="search-container">
            <form id="searchForm">
                <div class="form-group">
                    <label for="firstname">First Name *</label>
                    <input type="text" id="firstname" name="firstname" placeholder="First Name" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="lastname">Last Name *</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Last Name" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="street">Street Address</label>
                    <input type="text" id="street" name="street" placeholder="Street Address (optional)">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number (optional)">
                </div>

                <button type="submit" id="searchBtn">Search</button>
            </form>

            <div id="loading" class="hidden" role="status" aria-live="polite">
                <div class="spinner"></div>
                <p>Searching...</p>
            </div>

            <div id="error" class="hidden" role="alert" aria-live="assertive"></div>
        </section>

        <section id="results" class="hidden">
            <h2 id="resultsHeader">Search Results</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>SSN</th>
                            <th>DOB</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Phones</th>
                            <th>Emails</th>
                            <th>Addresses</th>
                            <th>City</th>
                            <th>State</th>
                            <th>ZIP</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
