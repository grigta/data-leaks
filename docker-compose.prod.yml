# Docker Compose for Production with GHCR images
# Images are built by GitHub Actions CI/CD and pulled from ghcr.io

# Logging configuration anchor for reuse across services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"
    labels: "service"

services:
  # Redis для distributed rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # PostgreSQL database for users, orders, cart
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ssn_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssn_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # Public API service
  public_api:
    image: ghcr.io/grigta/public-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/ssn_database.db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://na71ka921ma.top,https://www.na71ka921ma.top}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON_ENABLED: ${LOG_JSON_ENABLED:-true}
      WHITEPAGES_API_KEY: ${WHITEPAGES_API_KEY}
      WHITEPAGES_API_URL: ${WHITEPAGES_API_URL:-https://api.whitepages.com}
      CRYPTOCURRENCYAPI_KEY: ${CRYPTOCURRENCYAPI_KEY}
      IPN_WEBHOOK_URL: ${IPN_WEBHOOK_URL}
      DEFAULT_CRYPTO_CURRENCY: ${DEFAULT_CRYPTO_CURRENCY:-USDT}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-40}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-30}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      DAISYSMS_API_KEY: ${DAISYSMS_API_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin API service
  admin_api:
    image: ghcr.io/grigta/admin-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS_ADMIN:-https://infinitymoneyyy.xyz,https://www.infinitymoneyyy.xyz}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON_ENABLED: ${LOG_JSON_ENABLED:-true}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-40}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-30}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      UVICORN_WORKERS: ${UVICORN_WORKERS_ADMIN:-2}
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend service (public)
  frontend:
    image: ghcr.io/grigta/frontend:latest
    depends_on:
      - public_api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    volumes:
      - ./data:/app/data
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "5", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Frontend service
  admin_frontend:
    image: ghcr.io/grigta/admin-frontend:latest
    depends_on:
      - admin_api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "5", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Telegram Bot service
  telegram_bot:
    image: ghcr.io/grigta/telegram-bot:latest
    depends_on:
      postgres:
        condition: service_healthy
      public_api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_API_KEY: ${BOT_API_KEY}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON_ENABLED: ${LOG_JSON_ENABLED:-true}
      WS_RECONNECT_DELAY: ${WS_RECONNECT_DELAY:-5}
      WS_MAX_RECONNECT_DELAY: ${WS_MAX_RECONNECT_DELAY:-300}
      WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-30}
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  # Certbot для SSL сертификатов
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - backend
    logging: *default-logging

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    depends_on:
      - public_api
      - admin_api
      - frontend
      - admin_frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cloudflare-ips.conf:/etc/nginx/cloudflare-ips.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge

