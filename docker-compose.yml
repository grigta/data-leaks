version: '3.8'

services:
  # Redis для distributed rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ClickHouse database for SSN data (analytical search)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ssn_database}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ssn_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse-config/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      - ./clickhouse-config/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
      memlock:
        soft: -1
        hard: -1

  # PostgreSQL database for users, orders, cart
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=250"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-ssn_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssn_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Public API service
  public_api:
    image: ghcr.io/grigta/public-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}
      JWT_SECRET: ${JWT_SECRET:-change_me_long_random_string_min_32_chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://na71ka921ma.top,https://www.na71ka921ma.top,https://infinitymoneyyy.xyz,https://www.infinitymoneyyy.xyz}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WHITEPAGES_API_KEY: ${WHITEPAGES_API_KEY}
      WHITEPAGES_API_URL: ${WHITEPAGES_API_URL:-https://api.whitepages.com}
      CRYPTOCURRENCYAPI_KEY: ${CRYPTOCURRENCYAPI_KEY}
      IPN_WEBHOOK_URL: ${IPN_WEBHOOK_URL}
      DEFAULT_CRYPTO_CURRENCY: ${DEFAULT_CRYPTO_CURRENCY:-USDT}
      # Redis configuration for distributed rate limiting
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Database pool configuration
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Uvicorn workers
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      # SearchBug API configuration
      SEARCHBUG_CO_CODE: ${SEARCHBUG_CO_CODE}
      SEARCHBUG_PASSWORD: ${SEARCHBUG_PASSWORD}
      SEARCHBUG_API_URL: ${SEARCHBUG_API_URL:-https://data.searchbug.com/api/search.aspx}
      SEARCHBUG_DEFAULT_LIMIT: ${SEARCHBUG_DEFAULT_LIMIT:-100}
      # Bot API configuration
      BOT_API_KEY: ${BOT_API_KEY:-change_me_bot_api_key_min_32_chars}
      # Internal API configuration
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_API_INTERNAL_URL: ${ADMIN_API_INTERNAL_URL:-http://admin_api:8002}
      # DaisySMS API for Phone Lookup
      DAISYSMS_API_KEY: ${DAISYSMS_API_KEY}
      # ClickHouse Configuration
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ssn_database}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ssn_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse_password}
      CLICKHOUSE_MAX_CONNECTIONS: ${CLICKHOUSE_MAX_CONNECTIONS:-10}
      # Search Engine Configuration
      SEARCH_ENGINE_TYPE: ${SEARCH_ENGINE_TYPE:-clickhouse}
      # ClickHouse is now the only search engine
    volumes:
      - ./data:/app/data
      - ./huntrssn.cc/api:/app/api
      - ./shared/api/common:/app/api/common
      - ./shared/alembic:/app/alembic
      - ./shared/database:/app/database
    ports:
      - "8000:8000"
    networks:
      - backend
    restart: unless-stopped

  # Admin API service
  admin_api:
    image: ghcr.io/grigta/admin-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}
      JWT_SECRET: ${JWT_SECRET:-change_me_long_random_string_min_32_chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://na71ka921ma.top,https://www.na71ka921ma.top,https://infinitymoneyyy.xyz,https://www.infinitymoneyyy.xyz}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Database pool configuration
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Uvicorn workers (1 worker to keep WebSocket and HTTP in same process)
      UVICORN_WORKERS: ${UVICORN_WORKERS_ADMIN:-1}
      # Internal API configuration
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PUBLIC_API_INTERNAL_URL: ${PUBLIC_API_INTERNAL_URL:-http://public_api:8000}
      # ClickHouse Configuration
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ssn_database}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ssn_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse_password}
      CLICKHOUSE_MAX_CONNECTIONS: ${CLICKHOUSE_MAX_CONNECTIONS:-10}
      # Search Engine Configuration
      SEARCH_ENGINE_TYPE: ${SEARCH_ENGINE_TYPE:-clickhouse}
      # ClickHouse is now the only search engine
    volumes:
      - ./infinitymoneyyy.xyz/api/admin:/app/api/admin
      - ./shared/api/common:/app/api/common
      - ./shared/database:/app/database
    ports:
      - "8002:8002"
    networks:
      - backend
    restart: unless-stopped

  # Worker API service (qwertyworkforever.top)
  worker_api:
    build:
      context: .
      dockerfile: qwertyworkforever.top/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}
      JWT_SECRET: ${JWT_SECRET:-change_me_long_random_string_min_32_chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS_WORKER:-https://qwertyworkforever.top,https://www.qwertyworkforever.top}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      UVICORN_WORKERS: 1  # Must be 1 for in-memory WebSocket manager
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin_api:8002}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./qwertyworkforever.top/api:/app/api
      - ./shared/api/common:/app/api/common
      - ./shared/database:/app/database
    ports:
      - "8003:8003"
    networks:
      - backend
    restart: unless-stopped

  # Worker Frontend service (qwertyworkforever.top)
  worker_frontend:
    build:
      context: ./qwertyworkforever.top/worker-frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      WORKER_API_URL: http://worker_api:8003
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    ports:
      - "3002:3000"
    networks:
      - backend
    restart: unless-stopped

  # Telegram Bot service
  telegram_bot:
    image: ghcr.io/grigta/telegram-bot:latest
    depends_on:
      postgres:
        condition: service_healthy
      public_api:
        condition: service_healthy
    environment:
      # Database connection
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}

      # Telegram Bot configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

      # Public API WebSocket connection
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      BOT_API_KEY: ${BOT_API_KEY:-change_me_bot_api_key_min_32_chars}

      # WebSocket reconnection settings
      WS_RECONNECT_DELAY: ${WS_RECONNECT_DELAY:-5}
      WS_MAX_RECONNECT_DELAY: ${WS_MAX_RECONNECT_DELAY:-300}
      WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-30}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend
    restart: unless-stopped

  # Frontend service (public) - PRODUCTION mode
  frontend:
    image: frontend:local
    build:
      context: ./huntrssn.cc/frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      # SvelteKit adapter-node configuration for reverse proxy
      # These headers allow SvelteKit to correctly determine the origin behind nginx
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    ports:
      - "5173:3000"  # Map external 5173 to internal 3000 for compatibility
    networks:
      - backend
    restart: unless-stopped

  # Admin Frontend service - PRODUCTION mode
  admin_frontend:
    image: ghcr.io/grigta/admin-frontend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin_api:8002}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    ports:
      - "3001:3000"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    depends_on:
      public_api:
        condition: service_started
      admin_api:
        condition: service_started
      frontend:
        condition: service_started
      admin_frontend:
        condition: service_started
      worker_api:
        condition: service_started
      worker_frontend:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cloudflare-ips.conf:/etc/nginx/cloudflare-ips.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

networks:
  backend:
    driver: bridge
