version: '3.8'

services:
  # Redis для distributed rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL database for users, orders, cart
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=250"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-ssn_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssn_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Public API service
  public_api:
    image: ghcr.io/grigta/public-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/ssn_database.db}
      JWT_SECRET: ${JWT_SECRET:-change_me_long_random_string_min_32_chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WHITEPAGES_API_KEY: ${WHITEPAGES_API_KEY}
      WHITEPAGES_API_URL: ${WHITEPAGES_API_URL:-https://api.whitepages.com}
      CRYPTOCURRENCYAPI_KEY: ${CRYPTOCURRENCYAPI_KEY}
      IPN_WEBHOOK_URL: ${IPN_WEBHOOK_URL}
      DEFAULT_CRYPTO_CURRENCY: ${DEFAULT_CRYPTO_CURRENCY:-USDT}
      # Redis configuration for distributed rate limiting
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Database pool configuration
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Uvicorn workers
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      # SearchBug API configuration
      SEARCHBUG_CO_CODE: ${SEARCHBUG_CO_CODE}
      SEARCHBUG_PASSWORD: ${SEARCHBUG_PASSWORD}
      SEARCHBUG_API_URL: ${SEARCHBUG_API_URL:-https://data.searchbug.com/api/search.aspx}
      SEARCHBUG_DEFAULT_LIMIT: ${SEARCHBUG_DEFAULT_LIMIT:-100}
      # Bot API configuration
      BOT_API_KEY: ${BOT_API_KEY:-change_me_bot_api_key_min_32_chars}
      # Internal API configuration
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - backend
    restart: unless-stopped

  # Enrichment API service
  enrichment_api:
    image: ghcr.io/grigta/enrichment-api:latest
    environment:
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/ssn_database.db}
      ENRICHMENT_API_KEYS: ${ENRICHMENT_API_KEYS:-key1_change_me,key2_change_me,key3_change_me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8001"
    networks:
      - backend
    restart: unless-stopped

  # Admin API service
  admin_api:
    image: ghcr.io/grigta/admin-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}
      JWT_SECRET: ${JWT_SECRET:-change_me_long_random_string_min_32_chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Database pool configuration
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Uvicorn workers (lower for admin)
      UVICORN_WORKERS: ${UVICORN_WORKERS_ADMIN:-2}
      # Internal API configuration
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PUBLIC_API_INTERNAL_URL: ${PUBLIC_API_INTERNAL_URL:-http://public_api:8000}
    ports:
      - "8002:8002"
    networks:
      - backend
    restart: unless-stopped

  # Telegram Bot service
  telegram_bot:
    image: ghcr.io/grigta/telegram-bot:latest
    depends_on:
      postgres:
        condition: service_healthy
      public_api:
        condition: service_healthy
    environment:
      # Database connection
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ssn_user:change_me_strong_password@postgres:5432/ssn_users}

      # Telegram Bot configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

      # Public API WebSocket connection
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      BOT_API_KEY: ${BOT_API_KEY:-change_me_bot_api_key_min_32_chars}

      # WebSocket reconnection settings
      WS_RECONNECT_DELAY: ${WS_RECONNECT_DELAY:-5}
      WS_MAX_RECONNECT_DELAY: ${WS_MAX_RECONNECT_DELAY:-300}
      WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-30}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend
    restart: unless-stopped

  # Lookup API service
  lookup_api:
    image: ghcr.io/grigta/lookup-api:latest
    environment:
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/ssn_database.db}
      WHITEPAGES_API_KEY: ${WHITEPAGES_API_KEY}
      WHITEPAGES_API_URL: ${WHITEPAGES_API_URL:-https://api.whitepages.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_WORKERS: ${UVICORN_WORKERS_LOOKUP:-2}
    volumes:
      - ./data:/app/data
    ports:
      - "8003:8003"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/docs')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Lookup Frontend service
  lookup_frontend:
    image: ghcr.io/grigta/lookup-frontend:latest
    ports:
      - "127.0.0.1:3002:80"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend service (public) - PRODUCTION mode
  frontend:
    image: ghcr.io/grigta/frontend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://public_api:8000}
      ENRICHMENT_API_URL: ${ENRICHMENT_API_URL:-http://enrichment_api:8001}
      # SvelteKit adapter-node configuration for reverse proxy
      # These headers allow SvelteKit to correctly determine the origin behind nginx
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    ports:
      - "5173:3000"  # Map external 5173 to internal 3000 for compatibility
    networks:
      - backend
    restart: unless-stopped

  # Admin Frontend service - PRODUCTION mode
  admin_frontend:
    image: ghcr.io/grigta/admin-frontend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin_api:8002}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    ports:
      - "3001:3000"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    depends_on:
      public_api:
        condition: service_started
      enrichment_api:
        condition: service_started
      admin_api:
        condition: service_started
      frontend:
        condition: service_started
      admin_frontend:
        condition: service_started
      lookup_api:
        condition: service_healthy
      lookup_frontend:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge
